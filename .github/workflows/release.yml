name: Release Obsidian plugin

# Push a version tag (e.g. `git tag 0.0.2 && git push origin 0.0.2`) to build the
# plugin in CI, attach the artifacts to a GitHub Release, and attach a build
# provenance attestation so users can cryptographically verify the assets.
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write # create the release
  id-token: write # required for attestation signing
  attestations: write # write the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release for $TAG. Assets are signed with build provenance attestation." \
            main.js manifest.json styles.css
